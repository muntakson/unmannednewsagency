<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen 3.5 Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  header .model-badge {
    font-size: 12px;
    background: #1a3a2a;
    color: #4ade80;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { display: none; }
  .toggle .slider {
    width: 36px;
    height: 20px;
    background: #333;
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle .slider::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #888;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider { background: #1a3a2a; }
  .toggle input:checked + .slider::after { transform: translateX(16px); background: #4ade80; }
  header .status {
    margin-left: auto;
    font-size: 13px;
    color: #666;
  }
  header .status.streaming { color: #4ade80; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #1d4ed8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-bottom-left-radius: 4px;
  }
  .msg.assistant .thinking {
    color: #888;
    font-style: italic;
    border-left: 2px solid #444;
    padding-left: 10px;
    margin-bottom: 8px;
  }
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid #222;
    display: flex;
    gap: 12px;
  }
  #input {
    flex: 1;
    background: #141414;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 200px;
  }
  #input:focus { border-color: #1d4ed8; }
  #send {
    background: #1d4ed8;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send:hover { background: #2563eb; }
  #send:disabled { background: #333; color: #666; cursor: not-allowed; }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>
  <header>
    <h1>Ollama Chat</h1>
    <span class="model-badge">qwen3.5:9b</span>
    <label class="toggle" title="Enable deep thinking (slower but more thorough)">
      <span>Think</span>
      <input type="checkbox" id="think-toggle">
      <span class="slider"></span>
    </label>
    <span class="status" id="status">Ready</span>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button id="send">Send</button>
  </div>
<script>
const VLLM_URL = 'http://localhost:11434/v1';
const MODEL = 'qwen3.5:9b';
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const status = document.getElementById('status');
const thinkToggle = document.getElementById('think-toggle');
let messages = [];
let streaming = false;

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

async function send() {
  const text = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  streaming = true;
  sendBtn.disabled = true;
  status.textContent = 'Thinking...';
  status.className = 'status streaming';

  const msgEl = addMsg('assistant', '');
  let fullText = '';
  let thinkText = '';
  let inThink = false;

  try {
    const body = {
      model: MODEL,
      messages,
      stream: true,
      max_tokens: 4096,
    };
    if (!thinkToggle.checked) {
      body.chat_template_kwargs = { enable_thinking: false };
    }
    const res = await fetch(`${VLLM_URL}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const lines = decoder.decode(value, { stream: true }).split('\n');
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === 'data: [DONE]') continue;
        const jsonStr = trimmed.startsWith('data: ') ? trimmed.slice(6) : trimmed;
        try {
          const data = JSON.parse(jsonStr);
          const delta = data.choices?.[0]?.delta || {};
          const token = delta.content || '';
          const reasoning = delta.reasoning || '';

          // Handle reasoning (thinking) from vLLM
          if (reasoning) {
            thinkText += reasoning;
            inThink = true;
          }
          if (token) {
            inThink = false;
            fullText += token;
          }
          renderMsg(msgEl, thinkText || null, fullText);
          status.textContent = 'Streaming...';
        } catch {}
      }
    }

    // Clean up any remaining think text
    if (inThink && thinkText) {
      renderMsg(msgEl, thinkText, fullText);
    }

    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    msgEl.textContent = 'Error: ' + err.message;
  }

  streaming = false;
  sendBtn.disabled = false;
  status.textContent = 'Ready';
  status.className = 'status';
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function renderMsg(el, thinkContent, mainContent) {
  el.innerHTML = '';
  if (thinkContent) {
    const t = document.createElement('div');
    t.className = 'thinking';
    t.textContent = thinkContent;
    el.appendChild(t);
  }
  if (mainContent) {
    const m = document.createTextNode(mainContent);
    el.appendChild(m);
  }
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
